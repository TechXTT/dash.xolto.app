name: Dash UI Sweep

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ui-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DASH_TEST_EMAIL: ${{ secrets.DASH_TEST_EMAIL }}
      DASH_TEST_PASSWORD: ${{ secrets.DASH_TEST_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Vercel preview deployment
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-chromium-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (cached restore)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run dash UI sweep
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel-preview.outputs.url || 'https://dash.xolto.app' }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          DASH_TEST_EMAIL: ${{ secrets.DASH_TEST_EMAIL }}
          DASH_TEST_PASSWORD: ${{ secrets.DASH_TEST_PASSWORD }}
        run: pnpm exec playwright test __tests__/ui-sweep-2026-05.spec.ts --reporter=line --workers=2

      # Contract: test-results/ is NOT used by this suite. Playwright runtime
      # artifacts (traces, .last-run.json) go to playwright-failures/ (outputDir
      # in playwright.config.ts). Reporter outputs go to playwright-junit/ and
      # playwright-report/. test-results/ is therefore NEVER created on a green
      # run — the [ -d test-results ] check below is false, and the gate passes.
      # On a genuine test failure, Playwright still writes trace subdirs to
      # playwright-failures/; this job exits non-zero from the playwright step.
      # The gate below is a secondary belt-and-suspenders check: if test-results/
      # somehow appears, something unexpected wrote to it — surface it.
      # Do NOT change outputDir in playwright.config.ts without updating this comment.
      - name: Verify no failure traces (Class-8 ship-verification)
        if: always()
        run: |
          if [ -d test-results ] && [ -n "$(ls -A test-results 2>/dev/null)" ]; then
            echo "::error::Failure traces exist in test-results/ — gate failed even if playwright exit was 0"
            ls -la test-results/
            exit 1
          fi

      # Contract: tests-actually-ran invariant (XOL-172 / Class-8 sub-pattern B).
      # verify-no-failure-traces above can trivially pass when ZERO tests ran (e.g.,
      # globalSetup fails before any spec executes). Empty test-results/ != "everything
      # green"; it could mean "nothing ran". This step parses playwright-junit/junit.xml
      # and fails the workflow if either:
      #   - tests=0 (work didn't run; gate cannot be value-bearing)
      #   - failures>0 (belt-and-suspenders against verify-no-failure-traces missing a case)
      # This invariant pairs with the verify-no-failure-traces gate above; together they
      # enforce the Class-8 contract: "<work-actually-happened-check> && <command> &&
      # <artifact-state-check> || exit 1".
      - name: Verify tests actually ran (XOL-172 invariant)
        if: always()
        run: |
          JUNIT_PATH="playwright-junit/junit.xml"
          if [ ! -f "$JUNIT_PATH" ]; then
            echo "::error::JUnit report missing at $JUNIT_PATH — sweep step did not produce expected output."
            exit 1
          fi
          python3 - "$JUNIT_PATH" <<'PY'
          import sys, xml.etree.ElementTree as ET
          junit_path = sys.argv[1]
          try:
              root = ET.parse(junit_path).getroot()
          except ET.ParseError as e:
              print(f"::error::JUnit XML parse failed: {e}", flush=True)
              sys.exit(1)
          tests = int(root.get("tests", "0"))
          failures = int(root.get("failures", "0"))
          errors = int(root.get("errors", "0"))
          print(f"JUnit: tests={tests} failures={failures} errors={errors}", flush=True)
          if tests == 0:
              print("::error::tests-actually-ran invariant failed: tests=0. Likely globalSetup failure or spec-collection failure. Gate cannot be value-bearing if work didn't run.", flush=True)
              sys.exit(1)
          if failures != 0:
              print(f"::error::tests-actually-ran invariant failed: failures={failures}. Belt-and-suspenders against verify-no-failure-traces.", flush=True)
              sys.exit(1)
          if errors != 0:
              print(f"::error::tests-actually-ran invariant failed: errors={errors}. Belt-and-suspenders.", flush=True)
              sys.exit(1)
          PY

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dash-ui-sweep-failures-${{ github.run_id }}
          path: |
            __tests__/ui-sweep/
            playwright-failures/
          retention-days: 14
          if-no-files-found: ignore
